# =============================================================================
# ⚠ 已弃用 (DEPRECATED) — 见 docs/blueprint.example.yaml（唯一规范实例 v9）
# =============================================================================
# 本文件是「收敛前」的字符串规则版（dependency_rules 为 formal/plain 字符串，
# 非可执行规则）。自决策 ADR-0007 起，蓝图收敛到 typed-rule 元模型：
#   - 唯一规范实例：docs/blueprint.example.yaml
#   - 机器门(元模型)：docs/blueprint.schema.json
#   - 原语规格(人读)：docs/meta-model.md
# 本文件暂留，仅供三张原型内嵌 JSON 的历史参照；原型重新指向列为后续(ADR-0007)。
# =============================================================================
# Keel 应用蓝图 — 示例应用「我的博客」（弃用快照 v7）
# =============================================================================
# (原)唯一真相源 (single source of truth)。
# 三张原型 —— A 能力地图 / B 蓝图 diff 确认 / C 健康预警 —— 全部从本文件渲染，
# 不从任何想象中的代码逆推 (对应 PRD FR-3「地图内容全部来自蓝图」)。
#
# 本文件刻意采用「双表达」结构，因为这正是 PRD R1 可读半边要验证的核心
# (附录 B.11:「约束 ↔ 通俗表达」是最大缺口):
#   - 技术字段 (id / module / contract / depends_on / dependency_rules.formal …)
#       = 机器可检的约束，对应附录 B.7 的强制机制
#   - plain_* 字段 + dependency_rules.plain
#       = 给非程序员看的通俗表达
#
# 关键约束:原型界面只渲染 plain_* 字段，技术字段一律不出现在界面上。
# 每张 HTML 原型内嵌的 JSON 即本文件相关片段的逐字转写。
#
# 结构遵循 PRD 附录 B(默认架构原型:特性切片 / 模块化单体)。
# =============================================================================

meta:
  app_name: 我的博客                  # 地图顶栏显示的项目名
  archetype: content-site-with-data  # 附录 B.9「内容站加数据层」+ 特性切片默认
  blueprint_version: 7               # 蓝图版本化 (FR-2)。本文件以 v7 为「加收藏前」基线
  stack: web-fullstack-js-ts         # Web 全栈 JS/TS (PRD 决策 2)

# ── 分层与模块 (附录 B.2 / B.3) ──────────────────────────────────────────────
# 每个能力是一个自包含切片 features/<capability>/，内部分 ui / logic / data / contract。
layers:
  - id: ui
    plain: 界面（用户看到的、点的部分）
  - id: logic
    plain: 业务逻辑（这个功能要怎么做的规则）
  - id: data
    plain: 数据存取（去读、写资料）

core:                                # 横切设施:唯一规范实现 (附录 B.4)
  - id: core/auth
    plain: 登录管家（全应用唯一一处判断「有没有登录」）
  - id: core/db
    plain: 数据管家（全应用唯一一处连数据库）

# ── 依赖方向规则 (附录 B.3) ──────────────────────────────────────────────────
# 违反即「硬违规」，由门禁阻断 (附录 B.7)。
# formal = 机器检查；plain = 给非程序员的通俗表达（原型若需呈现规则，只用 plain）。
dependency_rules:
  - id: no-cross-feature-import
    formal: feature 之间不得直接 import；跨能力交互只能经 core 或对方 contract.ts
    plain: 每个功能各管各的，不许偷偷伸手进别的功能内部拿东西；要打交道得走正门（对方挂出来的对外接口）。
    severity: hard
  - id: layer-direction
    formal: 一个 feature 内部 ui → logic → data 单向，不得反向
    plain: 一个功能内部的次序是固定的——界面找逻辑、逻辑找数据，方向不能掉头。
    severity: hard
  - id: data-via-core
    formal: 任何层访问数据库或外部服务必须经 core 的统一封装
    plain: 所有功能存数据、取数据都得走同一个「数据管家」，不许自己私下连数据库。
    severity: hard
  - id: one-canonical-impl
    formal: 每个横切职责仅一个规范实现（鉴权、数据访问、表单、校验…）
    plain: 同一件事，全应用只能有一处来做。比如「判断有没有登录」只能有一份，不能这里写一套、那里又写一套。
    severity: hard

# ── 数据实体 (附录 B.5:db/schema 为数据模型唯一真相源) ───────────────────────
entities:
  - id: User
    plain_name: 用户
    fields: [id, email, passwordHash, createdAt]
    plain: 一个注册用户。
    status: established
  - id: Article
    plain_name: 文章
    fields: [id, title, body, authorId, publishedAt]
    plain: 一篇博客文章。
    status: established
  - id: Comment
    plain_name: 评论
    fields: [id, articleId, userId, body, createdAt]
    plain: 某人对某篇文章发的一条评论。
    status: established
  - id: Favorite                     # 本次新增 (附录 B.8 运行示例)
    plain_name: 收藏
    fields: [userId, articleId]
    plain: 「某个用户收藏了某篇文章」这件事的记录。
    status: proposed                 # v7 基线里尚不存在；prototype B 的 diff 才引入

# ── 能力清单 (附录 B.1:能力 = 代码切片 = 地图节点，三者一一对应) ──────────────
# layout 仅是地图视图的摆放坐标(表现层)，不属于蓝图真相，由视图分配。
# 画布坐标系 760 x 440；节点卡片约 150 x 64，(x,y) 为卡片左上角。
capabilities:
  - id: auth
    plain_name: 登录
    module: src/features/auth
    contract: src/features/auth/contract.ts
    status: established
    health: green
    plain_short: 让人注册、登录、退出。
    plain_detail: 这块负责「认人」——注册账号、登录、退出登录。其他凡是要「先登录才能用」的功能，都靠它。
    entities: [User]
    depends_on: []
    layout: {x: 40, y: 110}

  - id: article-list
    plain_name: 文章列表
    module: src/features/article-list
    contract: src/features/article-list/contract.ts
    status: established
    health: green
    plain_short: 把所有文章排成一个列表给人看。
    plain_detail: 这块负责把文章一篇篇列出来，是访客进站后最先看到的页面，点一篇就能进到「文章详情」。
    entities: [Article]
    depends_on: []
    layout: {x: 40, y: 290}

  - id: article-detail
    plain_name: 文章详情
    module: src/features/article-detail
    contract: src/features/article-detail/contract.ts
    status: established
    health: green
    plain_short: 展示某一篇文章的完整内容。
    plain_detail: 这块负责把单独一篇文章的完整内容显示出来。评论和（即将新增的）收藏都长在这个页面上。
    entities: [Article]
    depends_on:
      - target: article-list
        plain_reason: 要从「文章列表」点进来才能看到某一篇，所以「文章详情」离不开「文章列表」。
    layout: {x: 305, y: 290}

  - id: comment
    plain_name: 评论
    module: src/features/comment
    contract: src/features/comment/contract.ts
    status: established
    health: green
    plain_short: 让登录的人在文章下面留言。
    plain_detail: 这块负责让人在某篇文章下面发评论、看别人的评论。要先登录才能发。
    entities: [Comment]
    depends_on:
      - target: article-detail
        plain_reason: 评论是写在某篇文章下面的，所以「评论」要长在「文章详情」上。
      - target: auth
        plain_reason: 得先登录才能发评论，所以「评论」离不开「登录」。
    layout: {x: 570, y: 110}

  - id: favorite                     # 本次新增能力 (附录 B.8 运行示例)
    plain_name: 收藏文章
    module: src/features/favorite
    contract: src/features/favorite/contract.ts
    status: proposed                 # v7 基线里不存在；由 prototype B 的 diff 引入
    health: green
    plain_short: 让登录的人把喜欢的文章收起来。
    plain_detail: 这块负责让人把喜欢的文章收藏起来，之后能快速找回。收藏按钮长在文章详情页上，要先登录才能用。
    entities: [Favorite]
    depends_on:
      - target: article-detail
        plain_reason: 收藏按钮长在文章详情页上，没有文章详情就没处放收藏按钮。
      - target: auth
        plain_reason: 得先登录才能收藏，所以「收藏文章」离不开「登录」。
    layout: {x: 570, y: 290}

# ── 本次结构改动 (驱动 prototype B · 状态 DIFF_REVIEW) ────────────────────────
# 自然语言意图 (FR-4):「加一个用户能收藏文章的功能」。
# 系统把意图翻成蓝图 diff:新增能力 favorite + 新增实体 Favorite，
# 并标注受影响的现有能力 (FR-4 / FR-8 影响预览)。
change:
  intent: 加一个让用户能收藏文章的功能
  summary_plain: 给应用加一个新能力「收藏文章」。
  adds:
    capabilities: [favorite]
    entities: [Favorite]
  new_data_plain: 新增一种记录——记下「谁收藏了哪篇文章」。
  affected:                          # 会碰到的现有能力（受影响清单，原型 B 右栏渲染）
    - capability: article-detail
      plain: 文章详情页上要加一个「收藏」按钮。
    - capability: auth
      plain: 会用到「登录」来确认是谁在收藏（要先登录才能收藏）。
  not_touched:                       # 明确告知「不动什么」，帮助用户理解影响边界
    - capability: article-list
      plain: 文章列表 不动。
    - capability: comment
      plain: 评论 不动。
  new_edges:                         # diff 在地图上新增的连线（高亮·虚线）
    - {from: favorite, to: article-detail}
    - {from: favorite, to: auth}

# ── 健康报告 (驱动 prototype C · 流程 C 健康预警) ─────────────────────────────
# 收藏加完之后，漂移检测 (FR-6) 检出:代码里出现两处都在做收藏 ->
# 违反 one-canonical-impl(重复实现，附录 B.7 硬违规)。
# 另含一个软问题示例(命名)，用于演示问题清单的严重度分级。
health_report:
  overall: red
  problems:
    - id: dup-favorite
      severity: red                  # 硬违规「重复实现」(附录 B.7)
      capability: favorite
      title_plain: 「收藏」功能被做了两遍
      what_plain: 系统里现在有两处代码都在管「收藏」，它们在打架。
      why_bad_plain: >
        同一件事有两套做法，以后会越改越乱——改了一处、另一处没跟上，
        就会冒出「有时收藏成功、有时又不见了」这种怪毛病。这正是当初要避免的腐化。
      suggestion_plain: 建议把这两处合并成一处。
      fix_action_plain: 一键合并（系统会自动把两处收拢成一处，过程你不用看代码）
      rule: one-canonical-impl
    - id: naming-comment
      severity: yellow               # 软问题「命名不规范」(附录 B.7) -> 黄
      capability: comment
      title_plain: 「评论」里有个名字没按统一规矩起
      what_plain: 不影响现在使用，只是命名不太一致。
      why_bad_plain: 小毛病、不着急，但这类小乱子积少成多，时间久了会让结构慢慢看不清。
      suggestion_plain: 建议顺手改成统一的名字。
      fix_action_plain: 一键规范命名
      rule: naming-convention

# ── 蓝图 ↔ 代码 ↔ 地图 映射说明 (附录 B.8，仅供审阅，不渲染到界面) ─────────────
# capability favorite
#   -> 代码:features/favorite/{ui,logic,data,contract.ts}；经 core/auth 判登录、core/db 存取
#   -> 地图:新增「收藏文章」节点，连到「文章详情」与「登录」
#   -> 门禁:若在 favorite 内直连数据库 = 硬违规阻断(data-via-core)；
#           若另写一套鉴权 = 重复实现阻断(one-canonical-impl) <- 即 prototype C 的 dup-favorite
